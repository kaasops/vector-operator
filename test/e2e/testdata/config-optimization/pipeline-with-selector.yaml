apiVersion: observability.kaasops.io/v1alpha1
kind: VectorPipeline
metadata:
  name: selector-pipeline
spec:
  sources:
    logs:
      type: kubernetes_logs
      extra_label_selector: "app=selector-test"
  sinks:
    console:
      type: console
      inputs:
        - logs
      encoding:
        codec: json
